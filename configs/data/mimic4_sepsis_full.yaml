# INTERVENTI CLINICI
treatments:
  vasopressors:
    norepinephrine: [221906]
    epinephrine: [221289]
    vasopressin: [222315]
    phenylephrine: [221749]
    dopamine: [221662]
  ventilation:
    - 223848 # Ventilator Type
  fluids:
    - 225158 # NaCl 0.9%
    - 225828 # LR
    - 225943 # Solution

# Parametri Sepsis-3
icu_window_hours: 96
min_stay_hours: 12
sepsis:
  lead_time_hours: 6
  min_stay_hours: 48
  max_stay_hours: 500
  obs_window_start_rel: -24 
  obs_window_end_rel: 72    

